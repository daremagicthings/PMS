version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-soh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-soh_password}
      POSTGRES_DB: ${DB_NAME:-soh_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://soh_user:soh_password@db:5432/soh_db?schema=public
    ports:
      - "5050:5000"
    depends_on:
      - db

  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:


